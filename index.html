<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hair &amp; Makeup Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1612;
      color: #e8e0d4;
    }

    .landing {
      text-align: center;
      padding: 40px 24px;
      max-width: 520px;
      width: 100%;
    }

    .landing h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .landing p {
      color: #a89b8c;
      font-size: 0.95rem;
      margin-bottom: 48px;
    }

    .app-buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .app-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      border-radius: 12px;
      text-decoration: none;
      color: #e8e0d4;
      border: 1px solid #3d352d;
      background: #2a2520;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
      cursor: pointer;
    }

    .app-btn:hover {
      background: #342e28;
      border-color: #5a4f44;
      transform: translateY(-1px);
    }

    .app-btn:active {
      transform: translateY(0);
    }

    .app-icon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .app-icon--checks {
      background: linear-gradient(135deg, #4ABFB0, #38a89a);
    }

    .app-icon--prep {
      background: linear-gradient(135deg, #D4943A, #c07d2a);
    }

    .app-info {
      text-align: left;
    }

    .app-info h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .app-info span {
      font-size: 0.8rem;
      color: #a89b8c;
    }

    .app-arrow {
      margin-left: auto;
      color: #5a4f44;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="landing">
    <h1>Hair &amp; Makeup Pro</h1>
    <p>Production tools for hair &amp; makeup departments</p>

    <div class="app-buttons">
      <a href="/mobile/" class="app-btn">
        <div class="app-icon app-icon--checks">
          <svg width="24" height="24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        </div>
        <div class="app-info">
          <h2>Checks Happy</h2>
          <span>Mobile app for on-set continuity</span>
        </div>
        <span class="app-arrow">&rsaquo;</span>
      </a>

      <a href="/prep/" class="app-btn">
        <div class="app-icon app-icon--prep">
          <svg width="24" height="24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </div>
        <div class="app-info">
          <h2>Prep Happy</h2>
          <span>Desktop script breakdown &amp; planning</span>
        </div>
        <span class="app-arrow">&rsaquo;</span>
      </a>
    </div>
  </div>
</body>
</html>
